<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de CEP</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            margin: 2rem;
            color: #333;
        }

        .header {
            margin-bottom: 2rem;
        }

        h1 {
            color: #ff6600;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .search-container {
            margin-bottom: 2rem;
            padding: 1rem;
            background-color: #f8f9fa;
            border-radius: 8px;
            display: inline-block;
        }

        input[type="text"] {
            padding: 0.5rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right: 0.5rem;
        }

        button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            background-color: #ff6600;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e65c00;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            display: none;
            font-size: 0.9rem;
        }

        th, td {
            text-align: left;
            padding: 10px 12px;
            border-right: 1px solid #eaeaea;
        }

        th:last-child, td:last-child {
            border-right: none;
        }

        th {
            background-color: #ffffff;
            font-weight: bold;
            color: #000;
            border-bottom: 2px solid #000;
        }

        td {
            border-bottom: none;
        }

        tr {
            background-color: #f5f5f5;
        }
        
        .success-msg {
            color: green;
            margin-top: 10px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>



    <div class="search-container">
        <label for="cepInput"><strong>Buscar novo CEP:</strong></label>
        <input type="text" id="cepInput" placeholder="Ex: 01001000" maxlength="8">
        <button onclick="buscarCep()">Buscar e Gravar</button>
        <div id="successMsg" class="success-msg">Dados salvos no banco de dados com sucesso!</div>
    </div>

    <h2>Dados do Cep</h2>
    <table id="cepTable">
        <thead>
            <tr>
                <th>Cep</th>
                <th>Logradouro</th>
                <th>Complemento</th>
                <th>Bairro</th>
                <th>Localidade</th>
                <th>Uf</th>
                <th>ibge</th>
                <th>ddd</th>
            </tr>
        </thead>
        <tbody>
            <tr id="cepRow">
                <td id="resCep"></td>
                <td id="resLogradouro"></td>
                <td id="resComplemento"></td>
                <td id="resBairro"></td>
                <td id="resLocalidade"></td>
                <td id="resUf"></td>
                <td id="resIbge"></td>
                <td id="resDdd"></td>
            </tr>
        </tbody>
    </table>

<script>
    async function buscarCep() {
        const cep = document.getElementById('cepInput').value.replace(/\D/g, '');
        const table = document.getElementById('cepTable');
        const successMsg = document.getElementById('successMsg');
        
        if(cep.length !== 8) {
            alert('Por favor, digite um CEP válido com 8 dígitos.');
            return;
        }

        try {
            const response = await fetch(`/api/${cep}`);
            if(response.ok) {
                const data = await response.json();
                
                document.getElementById('resCep').textContent = data.cep;
                document.getElementById('resLogradouro').textContent = data.logradouro;
                document.getElementById('resComplemento').textContent = data.complemento;
                document.getElementById('resBairro').textContent = data.bairro;
                document.getElementById('resLocalidade').textContent = data.localidade;
                document.getElementById('resUf').textContent = data.uf;
                document.getElementById('resIbge').textContent = data.ibge;
                document.getElementById('resDdd').textContent = data.ddd;
                
                table.style.display = 'table';
                successMsg.style.display = 'block';
                
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3000);
            } else {
                alert('CEP não encontrado!');
                table.style.display = 'none';
                successMsg.style.display = 'none';
            }
        } catch (error) {
            console.error('Erro na requisição:', error);
            alert('Erro ao buscar o CEP.');
            table.style.display = 'none';
            successMsg.style.display = 'none';
        }
    }
</script>

</body>
</html>
